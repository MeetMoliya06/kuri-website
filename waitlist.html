<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Waitlist — kuri</title>
  <meta name="description" content="Be the first to try kuri. Join the waitlist and get early access to Surat's most honest restaurant guide.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    /* ── Waitlist page overrides ── */
    .waitlist-hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(120px, 12vw, 160px) clamp(16px, 4vw, 40px) clamp(60px, 6vw, 100px);
      background-color: var(--purple);
      position: relative;
      overflow: clip;
      text-align: center;
    }

    .waitlist-hero .hero-3d-grid {
      position: absolute;
      top: -120px; left: 50%;
      transform: translateX(-50%) perspective(800px) rotateX(60deg) scale(1.6);
      transform-origin: top center;
      width: 200%; height: 140%;
      background-image:
        linear-gradient(to right, rgba(172,250,224,0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(172,250,224,0.08) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.85;
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 75%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 75%, transparent 100%);
    }

    .waitlist-hero .hero-cloche-pattern {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 100 100' fill='none' stroke='rgba(255,255,255,0.025)' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'><path d='M50 25 A8 8 0 0 1 50 9 A8 8 0 0 1 50 25'/><path d='M15 70 A35 35 0 0 1 85 70 Z'/><path d='M10 75 Q50 78 90 75'/><path d='M10 70 L90 70' stroke-width='4'/></svg>");
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 1;
    }

    .waitlist-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--purple);
      background: var(--mint);
      padding: 0.45rem 1rem;
      border-radius: 50px;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .waitlist-heading {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -2px;
      line-height: 1.1;
      color: #ffffff;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 2;
    }

    .waitlist-heading .accent {
      color: var(--mint);
    }

    .waitlist-sub {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.75);
      max-width: 480px;
      margin: 0 auto 3rem;
      line-height: 1.7;
      position: relative;
      z-index: 2;
    }

    /* Sparkles around the form */
    .wl-sparkle {
      position: absolute;
      pointer-events: none;
      z-index: 3;
    }
    .wl-sparkle svg { display: block; }

    .wl-sparkle.s1 { top: 14%; left: 6%;  width: 28px; animation: spin-slow 18s linear infinite; opacity: 0.7; }
    .wl-sparkle.s2 { top: 11%; right: 8%; width: 22px; animation: spin-slow 24s linear infinite reverse; opacity: 0.5; }
    .wl-sparkle.s3 { bottom: 20%; left: 9%; width: 20px; animation: spin-slow 14s linear infinite; opacity: 0.6; }
    .wl-sparkle.s4 { bottom: 24%; right: 7%; width: 32px; animation: spin-slow 30s linear infinite reverse; opacity: 0.65; }
    .wl-sparkle.s5 { top: 50%; left: 3%;  width: 18px; animation: spin-slow 20s linear infinite; opacity: 0.45; }
    .wl-sparkle.s6 { top: 45%; right: 4%; width: 24px; animation: spin-slow 16s linear infinite reverse; opacity: 0.55; }

    @media (max-width: 768px) {
      .wl-sparkle.s1 { top: 22%; left: 4%; }
      .wl-sparkle.s2 { top: 20%; right: 4%; }
      .wl-sparkle.s3 { bottom: 10%; left: 5%; }
      .wl-sparkle.s4 { bottom: 12%; right: 4%; }
      .wl-sparkle.s5 { display: none; }
      .wl-sparkle.s6 { display: none; }
    }

    /* Form card */
    .form-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 660px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 28px;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.08),
        0 40px 80px rgba(0,0,0,0.25),
        0 8px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .form-card-top {
      background: var(--mint);
      padding: 1.1rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .form-card-top .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
    }

    .form-card-top .form-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--purple);
      margin-left: auto;
    }

    .iframe-wrapper {
      width: 100%;
      overflow: hidden;
    }
    .iframe-wrapper iframe {
      display: block;
      width: calc(100% + 18px);
      height: 1953px;
      border: none;
      background: #ffffff;
      margin-right: -18px;
    }

    /* Back link */
    .back-link {
      position: relative;
      z-index: 10;
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.65);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--mint); }
    .back-link svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <div class="noise-overlay"></div>

  <!-- Navigation -->
  <nav class="navbar" aria-label="Main Navigation">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-mark">k</span>
        <span class="logo-text">kuri</span>
      </a>
      <div class="nav-actions">
        <a href="index.html" class="btn-primary desktop-btn">
          <span>← Back home</span>
          <div class="btn-glow"></div>
        </a>
      </div>
    </div>
  </nav>

  <!-- Waitlist Page -->
  <div id="smooth-wrapper">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <section class="waitlist-hero">
      <div class="hero-3d-grid"></div>
      <div class="hero-cloche-pattern"></div>

      <!-- Floating sparkles -->
      <div class="wl-sparkle s1">
        <svg viewBox="0 0 40 40" fill="none" stroke="var(--mint)" stroke-width="4" stroke-linecap="round">
          <path d="M20 5 L20 35 M5 20 L35 20 M10 10 L30 30 M10 30 L30 10"/>
        </svg>
      </div>
      <div class="wl-sparkle s2">
        <svg viewBox="0 0 40 40" fill="none" stroke="var(--mint)" stroke-width="4" stroke-linecap="round">
          <path d="M20 5 L20 35 M5 20 L35 20 M10 10 L30 30 M10 30 L30 10"/>
        </svg>
      </div>
      <div class="wl-sparkle s3">
        <svg viewBox="0 0 40 40" fill="none" stroke="var(--mint)" stroke-width="4" stroke-linecap="round">
          <path d="M20 5 L20 35 M5 20 L35 20 M10 10 L30 30 M10 30 L30 10"/>
        </svg>
      </div>
      <div class="wl-sparkle s4">
        <svg viewBox="0 0 40 40" fill="none" stroke="var(--mint)" stroke-width="4" stroke-linecap="round">
          <path d="M20 5 L20 35 M5 20 L35 20 M10 10 L30 30 M10 30 L30 10"/>
        </svg>
      </div>
      <div class="wl-sparkle s5">
        <svg viewBox="0 0 40 40" fill="none" stroke="var(--mint)" stroke-width="3" stroke-linecap="round">
          <path d="M20 5 L20 35 M5 20 L35 20 M10 10 L30 30 M10 30 L30 10"/>
        </svg>
      </div>
      <div class="wl-sparkle s6">
        <svg viewBox="0 0 40 40" fill="none" stroke="var(--mint)" stroke-width="3" stroke-linecap="round">
          <path d="M20 5 L20 35 M5 20 L35 20 M10 10 L30 30 M10 30 L30 10"/>
        </svg>
      </div>

      <span class="waitlist-eyebrow">✦ Early Access</span>
      <h1 class="waitlist-heading">You're early.<br>That's a <span class="accent">good thing.</span></h1>
      <p class="waitlist-sub">Kuri isn't live yet — but you can grab your spot now. We'll reach out the moment doors open.</p>

      <!-- Google Form Card -->
      <div class="form-card">
        <div class="form-card-top">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="form-label">✦ kuri waitlist</span>
        </div>
        <div class="iframe-wrapper">
          <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdvffqjpfQPkRJm3k7PJ3yidH_xc2KSDrU50tMD91s8dI6_zw/viewform?embedded=true" width="640" height="1953" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
        </div>
      </div>

      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to home
      </a>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-container">
        <div class="footer-left">
          <div class="logo">
            <span class="logo-mark">k</span>
            <span class="logo-text">kuri</span>
          </div>
          <p class="copyright">© 2026 Kuri App. All rights reserved.</p>
        </div>
        <div class="footer-links">
          <a href="../privacy/" class="hover-underline">Privacy Policy</a>
          <a href="../terms/" class="hover-underline">Terms of Service</a>
          <a href="../help/" class="hover-underline">Help & Support</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
          document.querySelector('.navbar').classList.add('scrolled');
        } else {
          document.querySelector('.navbar').classList.remove('scrolled');
        }
      });

      gsap.from('.waitlist-eyebrow', { y: 20, opacity: 0, duration: 0.8, delay: 0.2, ease: 'power3.out' });
      gsap.from('.waitlist-heading', { y: 40, opacity: 0, duration: 1, delay: 0.35, ease: 'power4.out' });
      gsap.from('.waitlist-sub',     { y: 24, opacity: 0, duration: 0.9, delay: 0.5,  ease: 'power3.out' });
      gsap.from('.form-card',        { y: 50, opacity: 0, duration: 1.1, delay: 0.65, ease: 'power3.out' });
      gsap.from('.back-link',        { y: 16, opacity: 0, duration: 0.8, delay: 0.85, ease: 'power3.out' });

      document.body.classList.remove('loading');
    });
  </script>
</body>
</html>
